<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#022c22;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#064e3b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="60" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <circle cx="233" cy="197" r="209" fill="#059669" opacity="0.09" filter="url(#glow)" />
  <circle cx="911" cy="437" r="239" fill="#06b6d4" opacity="0.07" filter="url(#glow)" />
  <path d="M 0,720 L 1280,720 L 1280,680 Q 960,600 640,680 T 0,700 Z" fill="#059669" opacity="0.07" />

  <g opacity="0.03" font-family="monospace" font-size="12" fill="#fff" transform="translate(850, 80)">
    <text x="0" y="0">const project = {</text>
    <text x="20" y="20">id: "1",</text>
    <text x="20" y="40">status: "published",</text>
    <text x="20" y="60">techStack: ["HTML","CSS","JavaScript"],</text>
    <text x="20" y="80">deploy: "Netlify",</text>
    <text x="20" y="100">performance: "100/100"</text>
    <text x="0" y="120">};</text>
  </g>

  <g transform="translate(100, 220)">
